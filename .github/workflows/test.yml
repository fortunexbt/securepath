name: Evidence proof

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core package
        run: python -m pip install --no-deps -e .
      - name: Compile
        run: python -m compileall -q securepath tests main.py
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Verify deterministic replay
        run: python -m securepath replay --format json --verify
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
